<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyron - Authentication</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card login-card">
            <div class="logo">
                <h1>VYRON</h1>
                <p class="tagline">Authentication System</p>
            </div>

            <div class="form-group">
                <label for="licenseKey">License Key</label>
                <input type="text" id="licenseKey" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false">
            </div>

            <button id="btnValidate" class="btn btn-primary" onclick="handleValidate()">
                <span id="btnText">VALIDATE</span>
                <div id="btnSpinner" class="spinner hidden"></div>
            </button>

            <div id="statusMessage" class="status-msg hidden"></div>

            <div class="footer-links">
                <a href="admin.html">Admin Panel</a>
            </div>
        </div>

        <div class="particles" id="particles"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
